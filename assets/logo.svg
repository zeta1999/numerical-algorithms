<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="na-grad-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="na-grad-u" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Dark circle -->
  <circle cx="100" cy="100" r="96" fill="#0d1b2a"/>

  <!-- Matrix brackets -->
  <path d="M 42 50 L 32 50 L 32 150 L 42 150"
        fill="none" stroke="#e5e7eb" stroke-width="4" stroke-linecap="round"/>
  <path d="M 158 50 L 168 50 L 168 150 L 158 150"
        fill="none" stroke="#e5e7eb" stroke-width="4" stroke-linecap="round"/>

  <!-- Upper triangle (U) — blue/purple -->
  <rect x="50" y="58"  width="22" height="22" fill="url(#na-grad-u)" opacity="0.95"/>
  <rect x="76" y="58"  width="22" height="22" fill="url(#na-grad-u)" opacity="0.75"/>
  <rect x="102" y="58" width="22" height="22" fill="url(#na-grad-u)" opacity="0.55"/>
  <rect x="128" y="58" width="22" height="22" fill="url(#na-grad-u)" opacity="0.35"/>

  <rect x="76" y="84"  width="22" height="22" fill="url(#na-grad-u)" opacity="0.95"/>
  <rect x="102" y="84" width="22" height="22" fill="url(#na-grad-u)" opacity="0.75"/>
  <rect x="128" y="84" width="22" height="22" fill="url(#na-grad-u)" opacity="0.55"/>

  <rect x="102" y="110" width="22" height="22" fill="url(#na-grad-u)" opacity="0.95"/>
  <rect x="128" y="110" width="22" height="22" fill="url(#na-grad-u)" opacity="0.75"/>

  <rect x="128" y="136" width="22" height="22" fill="url(#na-grad-u)" opacity="0.95"/>

  <!-- Lower triangle (L) — orange/red -->
  <rect x="50" y="84"   width="22" height="22" fill="url(#na-grad-l)" opacity="0.85"/>

  <rect x="50" y="110"  width="22" height="22" fill="url(#na-grad-l)" opacity="0.85"/>
  <rect x="76" y="110"  width="22" height="22" fill="url(#na-grad-l)" opacity="0.65"/>

  <rect x="50" y="136"  width="22" height="22" fill="url(#na-grad-l)" opacity="0.85"/>
  <rect x="76" y="136"  width="22" height="22" fill="url(#na-grad-l)" opacity="0.65"/>
  <rect x="102" y="136" width="22" height="22" fill="url(#na-grad-l)" opacity="0.45"/>

  <!-- Diagonal highlight -->
  <rect x="50" y="58"   width="22" height="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <rect x="76" y="84"   width="22" height="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <rect x="102" y="110" width="22" height="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
  <rect x="128" y="136" width="22" height="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>

  <!-- Small check mark — proof/verification -->
  <path d="M 150 40 L 158 48 L 172 32"
        fill="none" stroke="#72efdd" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
